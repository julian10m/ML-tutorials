project:
  type: website
  execute-dir: project
  pre-render:
    - python scripts/sync_assets.py


website:
  description: "A blog built with Quarto"
  site-url: https://github.com/julian10m/ML-tutorials
  title: "ML-Tutorials"
  navbar:
    right:
      - about.qmd
      - icon: github
        href: https://github.com/
      - icon: twitter
        href: https://twitter.com
format:
  html:
    theme:
      - cosmo
      - brand
    css: styles.css
    include-in-header:
      text: |
        <script>
        window.MathJax = {
          tex: {
            macros: {
              sgn: "\\operatorname{sign}",
              E: "\\mathbb{E}",
              Var: "\\mathrm{Var}",
              argmin: "\\operatorname*{arg\\,min}",
              activation: "\\sigma",
              lossall: "L",
              loss: "\\mathcal{L}",
            }
          }
        };
        </script>



